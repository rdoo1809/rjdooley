    <div class="first-container">
      <section>
        <h1 class="slogan-black">LET'S GET IN TOUCH!</h1>
        <form class="contact-form" action="../scripts/mail.php" method="POST">
          <label for="name">Name:</label>
          <input type="text" name="name" id="name" />
          <label for="email">Email:</label>
          <input type="email" name="email" id="email" />
          <label for="subject">Subject:</label>
          <input type="text" name="subject" id="subject" />
          <label for="message">Message:</label>
          <textarea name="message" cols="50" rows="5"></textarea>
          <div
            class="g-recaptcha recaptcha"
            data-sitekey="6LdKlVskAAAAAB3ZbIzeFky6tueSJWrbJVXTuUe8"
            data-callback="callback"></div>
          <!-- <input class="submit-button" type="submit" value="Send"  /> -->
          <button
            id="submit-button"
            class="submit-button"
            type="submit"
            disabled>
            Send
          </button>
        </form>
      </section>
      <!-- End of Form -->
    </div>
    <!-- data-action="LOGIN" -->

    <!-- JS for enabling send button -->
    <script>
      function callback() {
        const submitButton = document.getElementById("submit-button");
        submitButton.removeAttribute("disabled");
      }
    </script>
